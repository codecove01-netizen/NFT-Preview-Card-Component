<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Frontend Mentor NFT Preview Card solution built with semantic HTML and CSS. 
        Responsive design featuring Flexbox and fluid typography.">
    <!-- CSS STYLES -->
    <link rel="stylesheet" href="./styles.css">

    <!-- ICON -->
    <link rel="icon" href="./images/favicon-32x32.png" type="image/x-icon">
    <title>NFT Preview Card | Frontend Mentor</title>

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- MAIN CONTAINER -->
    <main class="container">

        <!-- CARD -->
        <article class="main-card">
            <figure class="img-container">
                <a href="#"><img src="./images/image-equilibrium.jpg" alt="Equilibrium Image" class="card-img"></a>
            </figure>

            <!-- CARD DETAILS -->
            <h1 class="card-title"><a href="#">Equilibrium #3429</a></h1>
            <p class="card-description">Our Equilibrium collection promotes balance and calm.</p>
            <div class="card-details"> 
                <span class="card-details-eth"><img src="./images/icon-ethereum.svg" alt="Ethereum Icon"/> 0.041 ETH</span>
                <span class="card-details-days"> <img src="./images/icon-clock.svg" alt="Icon View">3 days left</span>
            </div>
            <hr>
            <p class="author"><img src="./images/image-avatar.png" alt="Profile Image">
                <span>
                    Creation of <span class="author-name"><a href="#">Jules Wyvern</a></span>
                </span>                
            </p>
        </article>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>Challenge by <a href="https://www.frontendmentor.io/challenges/nft-preview-card-component-SbdUL_w0U">Frontend Mentor</a>. 
            Coded by <a href="https://github.com/codecove01-netizen">Arati D'sa</a>.</p>
    </footer>    
</body>
</html>
